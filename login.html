{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md mt-12 border-t-4 border-primary-red">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-primary-red">Welcome Back</h2>
        <p class="text-gray-500 mt-2">Sign in to manage your business</p>
    </div>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" id="username" required
                   class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline border-gray-300 focus:border-primary-red">
        </div>
        
        <div class="mb-6">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" id="password" required
                   class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline border-gray-300 focus:border-primary-red">
        </div>
        
        <div class="flex items-center justify-between">
            <button type="submit" class="w-full bg-primary-red hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-200">
                Sign In
            </button>
        </div>
    </form>
    
    <div class="mt-6 text-center text-sm">
        <p class="text-gray-500">Need an account? Contact HBuddy Admin</p>
    </div>
</div>
{% endblock %}
