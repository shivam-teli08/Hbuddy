{% extends "base.html" %}

{% block title %}Setup{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-md mt-8 border-t-4 border-primary-indigo">
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-primary-indigo">One-Time Setup Configuration</h2>
        <p class="text-gray-500 mt-2">Complete your profile before starting daily operations.</p>
    </div>

    <form method="POST" action="{{ url_for('business.setup') }}">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold mb-2">Business Name</label>
                <input type="text" value="{{ current_user.business.name }}" readonly class="shadow border rounded-lg w-full py-2 px-3 bg-gray-50">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Business Type</label>
                <select name="business_type" required class="shadow border rounded-lg w-full py-2 px-3">
                    <option value="Restaurant">Restaurant</option>
                    <option value="Hotel">Hotel</option>
                    <option value="Cafe">Cafe</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Address</label>
                <input type="text" name="address" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Contact Number</label>
                <input type="text" name="contact" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">GST Number</label>
                <input type="text" name="gst_number" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Working Days</label>
                <input type="text" name="working_days" required placeholder="Mon-Sun" class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Opening Time</label>
                <input type="time" name="opening_time" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Closing Time</label>
                <input type="time" name="closing_time" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
        </div>
        <div class="mt-8">
            <button type="submit" class="w-full btn-primary">Complete Setup</button>
        </div>
    </form>
</div>
{% endblock %}
