{% extends "base.html" %}

{% block title %}Register Business{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-md mt-8 border-t-4 border-primary-indigo">
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-primary-indigo">Register New Business</h2>
        <p class="text-gray-500 mt-2">Create a business and owner credentials in one step.</p>
    </div>

    <form method="POST" action="{{ url_for('admin.register_business_view') }}">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold mb-2">Business Name</label>
                <input type="text" name="name" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Business Type</label>
                <select name="business_type" class="shadow border rounded-lg w-full py-2 px-3">
                    <option value="Restaurant">Restaurant</option>
                    <option value="Hotel">Hotel</option>
                    <option value="Cafe">Cafe</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Username</label>
                <input type="text" name="username" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2">Password</label>
                <input type="password" name="password" required class="shadow border rounded-lg w-full py-2 px-3">
            </div>
        </div>
        <div class="mt-8">
            <button type="submit" class="btn-primary">Register Business</button>
        </div>
    </form>
</div>
{% endblock %}
