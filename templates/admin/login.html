{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-md mt-12 border-t-4 border-primary-indigo">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-primary-indigo">Admin Login</h2>
        <p class="text-gray-500 mt-2">Sign in to manage registered businesses</p>
    </div>

    <form method="POST" action="{{ url_for('auth.admin_login') }}">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" name="username" id="username" required class="shadow border rounded-lg w-full py-2 px-3">
        </div>

        <div class="mb-6">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" id="password" required class="shadow border rounded-lg w-full py-2 px-3">
        </div>

        <button type="submit" class="w-full btn-primary">Sign In</button>
    </form>
</div>
{% endblock %}
